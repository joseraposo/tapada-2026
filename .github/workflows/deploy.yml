name: Deploy to VPS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax on all Python files
        run: |
          python -m py_compile app.py
          echo "Syntax OK"

      - name: Check Flask app starts without errors
        env:
          SECRET_KEY: "ci-test-key"
          EVENT_ACCESS_CODE: "ci-test-code"
          DB_LOCATION: "/tmp/test.db"
        run: |
          python -c "from app import app; print('App loaded OK')"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo $TESTE

            APP_DIR="/var/www/tapada"
            VENV="$APP_DIR/venv"
            SERVICE="tapada"

            echo "==> Pulling latest code..."
            cd $APP_DIR
            git pull origin main

            echo "==> Installing/updating Python dependencies..."
            $VENV/bin/pip install -r requirements.txt --quiet

            echo "==> Compiling Babel assets..."
            $VENV/bin/pybabel compile -d $APP_DIR/translations

            echo "==> Restarting gunicorn service..."
            sudo systemctl restart $SERVICE

            echo "==> Reloading nginx..."
            sudo systemctl reload nginx

            echo "==> Done! Deployment successful."
