<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Access Event') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>{{ _('Event Access') }}</h2>
        <p>{{ _('Please enter the access code provided in your invitation.') }}</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <input type="password" name="code" placeholder="{{ _('Access Code') }}" required>
            <button type="submit">{{ _('Enter') }}</button>
        </form>
    </div>
</body>
</html>
