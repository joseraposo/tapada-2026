{% extends "layout.html" %}

{% block content %}
    <div class="content-section">
        <form method="POST">
            <div id="guests-container">
                <div class="guest-entry">
                    <label>{{ _('Name of the guest') }}:</label>
                    <input
                            type="text"
                            name="name"
                            pattern="[A-Za-z\u00C0-\u00D6\u00D8-\u00F6\u00F8-\u00FF ]{1,40}"
                            maxlength="40"
                            title="{{ _('We all love a good riddle, but please, use only letters to refer to the attending guest...') }}"
                            required>
                </div>
            </div>

            <button type="button" id="add-guest">{{ _('Add guest') }}</button>
            <button type="submit">{{ _('Confirm attendance') }}</button>
        </form>

        <script>
            const labelText = {{ _('Name of the guest') | tojson }};
            const titleText = {{ _('We all love a good riddle, but please, use only letters to refer to the attending guest...') | tojson }};
            const removeText = {{ _('Remove') | tojson }};
            const maxGuestsText = {{ _('Maximum of 10 guests per submission.') | tojson }};
            const MAX_GUESTS = 10;

            const addButton = document.getElementById('add-guest');

            addButton.addEventListener('click', function () {
                const container = document.getElementById('guests-container');
                const currentCount = container.querySelectorAll('.guest-entry').length;

                if (currentCount >= MAX_GUESTS) {
                    alert(maxGuestsText);
                    return;
                }

                const entry = document.createElement('div');
                entry.classList.add('guest-entry');
                entry.innerHTML = `
                    <label>${labelText}:</label>
                    <input
                        type="text"
                        name="name"
                        pattern="[A-Za-z\\u00C0-\\u00D6\\u00D8-\\u00F6\\u00F8-\\u00FF ]{1,40}"
                        maxlength="40"
                        title="${titleText}"
                        required>
                    <button type="button" class="remove-guest">${removeText}</button>
                `;
                container.appendChild(entry);

                if (container.querySelectorAll('.guest-entry').length >= MAX_GUESTS) {
                    addButton.disabled = true;
                }

                entry.querySelector('.remove-guest').addEventListener('click', function () {
                    entry.remove();
                    addButton.disabled = false;
                });
            });
        </script>
    </div>
{% endblock %}
